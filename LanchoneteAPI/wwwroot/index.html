<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lanchonete</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/app.css">
</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">

            <div>

                <div class="sidebar-header">

                    <h3 class="sidebar-title">
                        Cardápio
                    </h3>

                    <button class="toggle-btn"
                            onclick="toggleSidebar()">

                        ☰
                    </button>

                </div>

                <div id="menuProdutos"></div>

            </div>

        </aside>

        <!-- MAIN -->
        <main class="main-content">

            <!-- TOPBAR -->
            <div class="topbar">

                <div class="user-box">

                    <div class="avatar">
                        👤
                    </div>

                    <div>
                        <small>Bem-vindo</small>
                        <h6 id="nomeUsuario">Cliente</h6>
                    </div>

                </div>

                <button class="btn btn-danger"
                        onclick="logout()">

                    Sair
                </button>

            </div>

            <!-- HERO -->
            <section class="hero">

                <div>

                    <h1>Os melhores lanches 🍟</h1>

                    <p>
                        Monte seu pedido da forma que quiser.
                    </p>

                </div>

            </section>

            <!-- CAROUSEL -->
            <section>

                <h4 class="section-title">
                    Destaques
                </h4>

                <div class="carousel-produtos"
                     id="carouselProdutos">

                </div>

            </section>

            <!-- PRODUTO -->
            <section class="produto-area">

                <div id="produtoSelecionado">

                    <div class="empty-state">

                        <h4>🍔 Escolha um produto</h4>

                        <p>
                            Clique em algum item do cardápio.
                        </p>

                    </div>

                </div>

            </section>

            <!-- CARRINHO -->
            <section class="carrinho-section">

                <div class="carrinho-card">

                    <h4>🛒 Carrinho</h4>

                    <div id="carrinho"></div>

                    <div id="total"
                         class="total">

                        Total: R$ 0,00

                    </div>

                    <button class="btn-finalizar"
                            onclick="finalizarPedido()">

                        Finalizar Pedido

                    </button>

                </div>

            </section>

        </main>

    </div>

    <script src="js/app.js"></script>
</body>
</html>
