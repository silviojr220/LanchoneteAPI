<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lanchonete</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card {
            border: none;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

            .card:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            }

        .price {
            font-size: 1.2rem;
            color: #198754;
        }

        .carrinho-card {
            position: sticky;
            top: 20px;
            border-radius: 12px;
        }

        .btn-primary {
            border-radius: 8px;
        }

        .btn-success {
            border-radius: 8px;
            font-weight: bold;
        }

        .list-group-item {
            border: none;
            border-bottom: 1px solid #eee;
        }

        .badge-qtd {
            background-color: #0d6efd;
        }

        .produto-card {
            border: none;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

            .produto-card:hover {
                transform: translateY(-6px);
                box-shadow: 0 12px 25px rgba(0,0,0,0.1);
            }

        .price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #198754;
        }

        .btn-primary {
            border-radius: 8px;
            transition: 0.2s;
        }

            .btn-primary:hover {
                transform: scale(1.03);
            }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark px-4 py-3">
        <span class="navbar-brand fw-bold fs-4">🍔 Lanchonete</span>

        <button class="btn btn-outline-light btn-sm" onclick="logout()">Sair</button>
    </nav>

    <div class="container mt-4">
        <div class="row g-4">

            <!-- PRODUTOS -->
            <div class="col-lg-8">
                <h4 class="mb-3 fw-semibold">Cardápio</h4>
                <div id="produtos" class="row g-4"></div>
            </div>

            <!-- CARRINHO -->
            <div class="col-lg-4">
                <div class="card carrinho-card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-3">🛒 Carrinho</h5>

                        <ul id="carrinho" class="list-group mb-3"></ul>

                        <div id="total" class="fw-bold mb-3 text-end"></div>

                        <button class="btn btn-success w-100 mb-2" onclick="finalizarPedido()">
                            Finalizar Pedido
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
