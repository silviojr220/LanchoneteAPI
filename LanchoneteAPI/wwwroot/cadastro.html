<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --amarelo: #FFC107;
            --amarelo-escuro: #ffb300;
        }

        body {
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(255,193,7,0.4), rgba(255,255,255,0.4)), url('https://images.unsplash.com/photo-1550547660-d9450f859349');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 360px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            color: #333;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid #ddd;
        }

            .form-control:focus {
                border-color: var(--amarelo);
                box-shadow: 0 0 0 2px rgba(255,193,7,0.3);
            }

        .password-box {
            position: relative;
        }

        .show-pass {
            position: absolute;
            right: 12px;
            top: 10px;
            cursor: pointer;
        }

        .btn-main {
            background: var(--amarelo);
            border: none;
            border-radius: 30px;
            font-weight: bold;
        }

            .btn-main:hover {
                background: var(--amarelo-escuro);
            }

        .links {
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2 class="text-center mb-4">Criar Conta</h2>

        <input type="text" id="email" class="form-control mb-3" placeholder="Email">

        <input type="tel"
               id="telefone"
               class="form-control mb-3"
               placeholder="Telefone"
               maxlength="15"
               oninput="formatarTelefone(this)">

        <div class="password-box mb-3">
            <input type="password" id="senha" class="form-control" placeholder="Senha">
            <span class="show-pass" onclick="toggleSenha()">👁</span>
        </div>

        <button class="btn btn-main w-100" onclick="cadastrar()">Cadastrar</button>

        <div class="links">
            Já tem conta? <a href="login.html">Entrar</a>
        </div>
    </div>

    <script defer>
        function toggleSenha() {
            const input = document.getElementById("senha");
            input.type = input.type === "password" ? "text" : "password";
        }

        async function cadastrar() {

            const email = document.getElementById("email").value.trim();

            const senha = document.getElementById("senha").value;

            const telefone = document
                .getElementById("telefone")
                .value
                .replace(/\D/g, "");

            // validações
            if (!email || !senha || !telefone) {
                alert("Preencha todos os campos");
                return;
            }

            // telefone precisa ter DDD + número
            if (telefone.length < 10 || telefone.length > 11) {
                alert("Telefone inválido");
                return;
            }

            try {

                const res = await fetch(
                    "https://localhost:7200/api/usuario",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify({
                            Email: email,
                            Senha: senha,
                            Telefone: telefone,
                            Perfil: "CLIENTE"
                        })
                    }
                );

                if (!res.ok) {
                    alert("Erro ao cadastrar");
                    return;
                }

                alert("Conta criada com sucesso!");

                window.location.href = "login.html";

            } catch (erro) {

                console.error(erro);

                alert("Erro na API");
            }
        }

        function formatarTelefone(input) {

            // remove tudo que não for número
            let valor = input.value.replace(/\D/g, "");

            // limita a 11 números
            valor = valor.substring(0, 11);

            // aplica máscara
            if (valor.length > 10) {

                valor = valor.replace(
                    /^(\d{2})(\d{5})(\d{4}).*/,
                    "($1) $2-$3"
                );

            } else if (valor.length > 6) {

                valor = valor.replace(
                    /^(\d{2})(\d{4})(\d{0,4}).*/,
                    "($1) $2-$3"
                );

            } else if (valor.length > 2) {

                valor = valor.replace(
                    /^(\d{2})(\d{0,5})/,
                    "($1) $2"
                );

            } else {

                valor = valor.replace(
                    /^(\d*)/,
                    "($1"
                );
            }

            input.value = valor;
        }
    </script>

</body>
</html>
