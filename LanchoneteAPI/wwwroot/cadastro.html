<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cadastro</title>

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- ICONS -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        :root {
            --amarelo: #FFC107;
            --amarelo-escuro: #ffb300;
        }

        /* BODY */

        body {
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient( rgba(255,193,7,0.35), rgba(255,255,255,0.25) ), url('https://images.unsplash.com/photo-1550547660-d9450f859349');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CARD */

        .box {
            width: 380px;
            padding: 40px;
            border-radius: 24px;
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(14px);
            color: #333;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            animation: fade .35s ease;
        }

        @keyframes fade {

            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            font-weight: bold;
        }

        /* INPUTS */

        .input-group-text {
            background: rgba(255,255,255,.7);
            border: 1px solid #ddd;
            border-radius: 12px 0 0 12px;
        }

        .form-control {
            background: rgba(255,255,255,.75);
            border-radius: 0 12px 12px 0;
            border: 1px solid #ddd;
            height: 52px;
        }

            .form-control:focus {
                border-color: var(--amarelo);
                box-shadow: 0 0 0 3px rgba(255,193,7,.25);
            }

        /* SENHA */

        .password-box {
            position: relative;
            display: flex;
            align-items: center;
        }

            .password-box .form-control {
                padding-left: 55px;
                padding-right: 55px;
                border-radius: 14px;
            }

        .input-icon {
            position: absolute;
            left: 18px;
            z-index: 5;
            color: #555;
            display: flex;
            align-items: center;
        }

        .show-pass {
            position: absolute;
            right: 18px;
            z-index: 5;
            cursor: pointer;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* BOTÃO */

        .btn-main {
            background: var(--amarelo);
            border: none;
            border-radius: 30px;
            font-weight: bold;
            height: 52px;
            transition: .25s;
        }

            .btn-main:hover {
                background: var(--amarelo-escuro);
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(255,193,7,.35);
            }

        /* LINKS */

        .links {
            text-align: center;
            margin-top: 18px;
        }

            .links a {
                text-decoration: none;
                font-weight: 600;
                color: #555;
            }

        /* ICONS */

        .bi {
            vertical-align: middle;
        }

        h2 i,
        .btn-main i {
            margin-right: 8px;
        }
    </style>

</head>

<body>

    <div class="box">

        <h2 class="text-center mb-4">

            <i class="bi bi-person-plus-fill"></i>
            Criar Conta

        </h2>

        <!-- EMAIL -->

        <div class="input-group mb-3">

            <span class="input-group-text">

                <i class="bi bi-envelope-fill"></i>

            </span>

            <input type="text"
                   id="email"
                   class="form-control"
                   placeholder="Email">

        </div>

        <!-- TELEFONE -->

        <div class="input-group mb-3">

            <span class="input-group-text">

                <i class="bi bi-telephone-fill"></i>

            </span>

            <input type="tel"
                   id="telefone"
                   class="form-control"
                   placeholder="Telefone"
                   maxlength="15"
                   oninput="formatarTelefone(this)">

        </div>

        <!-- SENHA -->

        <div class="password-box mb-3">

            <span class="input-icon">

                <i class="bi bi-lock-fill"></i>

            </span>

            <input type="password"
                   id="senha"
                   class="form-control"
                   placeholder="Senha">

            <span class="show-pass"
                  onclick="toggleSenha()">

                <i class="bi bi-eye-fill"></i>

            </span>

        </div>

        <!-- BOTÃO -->

        <button class="btn btn-main w-100"
                onclick="cadastrar()">

            <i class="bi bi-check-circle-fill"></i>
            Cadastrar

        </button>

        <!-- LINKS -->

        <div class="links">

            Já tem conta?

            <a href="login.html">
                Entrar
            </a>

        </div>

    </div>

    <!-- TOAST -->

    <div class="toast-container position-fixed bottom-0 end-0 p-3">

        <div id="toast"
             class="toast border-0 text-white">

            <div class="d-flex">

                <div class="toast-body"></div>

                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>

            </div>

        </div>

    </div>

    <!-- SCRIPTS -->

    <script>

        /* TOAST */

        function toast(msg, tipo = "warning") {

            const t = document.getElementById("toast");

            const body = t.querySelector(".toast-body");

            t.className = "toast border-0 text-white";

            if (tipo === "success") {

                t.classList.add("bg-success");

            } else if (tipo === "error") {

                t.classList.add("bg-danger");

            } else {

                t.classList.add("bg-warning");

                t.classList.remove("text-white");

                t.classList.add("text-dark");
            }

            body.innerHTML = msg;

            new bootstrap.Toast(t).show();
        }

        /* MOSTRAR SENHA */

        function toggleSenha() {

            const input = document.getElementById("senha");

            const icon = document.querySelector(".show-pass i");

            if (input.type === "password") {

                input.type = "text";

                icon.className = "bi bi-eye-slash-fill";

            } else {

                input.type = "password";

                icon.className = "bi bi-eye-fill";
            }
        }

        /* TELEFONE */

        function formatarTelefone(input) {

            let valor = input.value.replace(/\D/g, "");

            valor = valor.substring(0, 11);

            if (valor.length > 10) {

                valor = valor.replace(
                    /^(\d{2})(\d{5})(\d{4}).*/,
                    "($1) $2-$3"
                );

            } else if (valor.length > 6) {

                valor = valor.replace(
                    /^(\d{2})(\d{4})(\d{0,4}).*/,
                    "($1) $2-$3"
                );

            } else if (valor.length > 2) {

                valor = valor.replace(
                    /^(\d{2})(\d{0,5})/,
                    "($1) $2"
                );

            } else {

                valor = valor.replace(
                    /^(\d*)/,
                    "($1"
                );
            }

            input.value = valor;
        }

        /* CADASTRO */

        async function cadastrar() {

            const email =
                document.getElementById("email")
                    .value
                    .trim();

            const senha =
                document.getElementById("senha")
                    .value;

            const telefone =
                document.getElementById("telefone")
                    .value
                    .replace(/\D/g, "");

            /* VALIDAÇÕES */

            if (!email || !senha || !telefone) {

                toast(
                    '<i class="bi bi-exclamation-triangle-fill"></i> Preencha todos os campos',
                    'warning'
                );

                return;
            }

            if (telefone.length < 10 ||
                telefone.length > 11) {

                toast(
                    '<i class="bi bi-telephone-x-fill"></i> Telefone inválido',
                    'warning'
                );

                return;
            }

            try {

                const res = await fetch(
                    "/api/usuario",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify({

                            Email: email,

                            Senha: senha,

                            Telefone: telefone,

                            Perfil: "CLIENTE"
                        })
                    }
                );

                if (!res.ok) {

                    toast(
                        '<i class="bi bi-x-circle-fill"></i> Erro ao cadastrar',
                        'error'
                    );

                    return;
                }

                toast(
                    '<i class="bi bi-check-circle-fill"></i> Conta criada com sucesso!',
                    'success'
                );

                setTimeout(() => {

                    window.location.href =
                        "login.html";

                }, 1200);

            } catch {

                toast(
                    '<i class="bi bi-wifi-off"></i> Erro na API',
                    'error'
                );
            }
        }

    </script>

    <!-- BOOTSTRAP JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
