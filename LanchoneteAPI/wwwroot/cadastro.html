<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --amarelo: #FFC107;
            --amarelo-escuro: #ffb300;
        }

        body {
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(255,193,7,0.4), rgba(255,255,255,0.4)), url('https://images.unsplash.com/photo-1550547660-d9450f859349');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 360px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            color: #333;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid #ddd;
        }

            .form-control:focus {
                border-color: var(--amarelo);
                box-shadow: 0 0 0 2px rgba(255,193,7,0.3);
            }

        .password-box {
            position: relative;
        }

        .show-pass {
            position: absolute;
            right: 12px;
            top: 10px;
            cursor: pointer;
        }

        .btn-main {
            background: var(--amarelo);
            border: none;
            border-radius: 30px;
            font-weight: bold;
        }

            .btn-main:hover {
                background: var(--amarelo-escuro);
            }

        .links {
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2 class="text-center mb-4">Criar Conta</h2>

        <input type="text" id="email" class="form-control mb-3" placeholder="Email">

        <div class="password-box mb-3">
            <input type="password" id="senha" class="form-control" placeholder="Senha">
            <span class="show-pass" onclick="toggleSenha()">👁</span>
        </div>

        <button class="btn btn-main w-100" onclick="cadastrar()">Cadastrar</button>

        <div class="links">
            Já tem conta? <a href="login.html">Entrar</a>
        </div>
    </div>

    <script>
        function toggleSenha() {
            const input = document.getElementById("senha");
            input.type = input.type === "password" ? "text" : "password";
        }

        async function cadastrar() {
            const email = emailEl.value;
            const senha = senhaEl.value;

            if (!email || !senha) {
                alert("Preencha tudo");
                return;
            }

            const res = await fetch("https://localhost:7200/api/usuario", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    Email: email,
                    Senha: senha,
                    Perfil: "CLIENTE"
                })
            });

            if (!res.ok) {
                alert("Erro ao cadastrar");
                return;
            }

            alert("Conta criada!");
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
