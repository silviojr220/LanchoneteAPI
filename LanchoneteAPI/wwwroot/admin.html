<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - Lanchonete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <h1>⚙️ Painel Admin</h1>

    <button class="btn btn-danger mb-3" onclick="logout()">Sair</button>

    <hr>

    <h3>Cadastrar Produto</h3>

    <input type="text" id="nome" placeholder="Nome" class="form-control mb-2">
    <input type="text" id="tipo" placeholder="Tipo (Lanche/Bebida)" class="form-control mb-2">
    <input type="number" id="preco" placeholder="Preço" class="form-control mb-2">

    <button class="btn btn-success mb-4" onclick="criarProduto()">Cadastrar</button>

    <hr>

    <h3>Lista de Produtos</h3>
    <ul id="listaProdutos"></ul>

    <script src="admin.js"></script>
</body>
</html>
